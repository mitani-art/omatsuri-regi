<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お祭りかんたんレジ＆カウンター</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E8503A">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="お祭りレジ">
<style>
  :root{
    --red:#E8503A;      /* 提灯レッド */
    --navy:#1F3A5F;     /* 法被ネイビー */
    --gold:#F5A623;     /* 屋台ゴールド */
    --green:#2E9E5B;    /* OKグリーン */
    --cream:#FFF8EC;    /* 背景クリーム */
    --white:#FFFFFF;
    --ink:#22252A;
    --shadow:0 3px 0 rgba(0,0,0,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI",Meiryo,sans-serif;
    background:var(--cream);
    color:var(--ink);
    padding-bottom:120px;
    user-select:none;
  }
  button{
    font-family:inherit;
    border:none;
    cursor:pointer;
    touch-action:manipulation;
  }
  button:active{transform:translateY(2px); box-shadow:none;}

  /* ===== ヘッダー＆常時表示の集計 ===== */
  header{
    background:var(--red);
    color:#fff;
    text-align:center;
    padding:8px 10px 6px;
  }
  header h1{margin:0; font-size:19px; letter-spacing:1px;}
  .booth-name{
    margin:2px 0 0; font-size:14px; font-weight:700;
    color:#FFE9C2; letter-spacing:.5px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ===== 名前設定 ===== */
  .name-edit-btn{
    display:block; margin:16px auto 0;
    background:#EDE7D6; color:#6B6250;
    font-size:15px; font-weight:700;
    padding:10px 18px; border-radius:999px;
  }
  .name-settings{
    display:none;
    background:#F4F1E6;
    border:2px solid var(--navy);
    border-radius:14px;
    padding:12px;
    margin:10px 8px 0;
  }
  .name-settings.open{display:block;}
  .name-settings label{
    display:block; font-size:15px; font-weight:800;
    color:var(--navy); margin:8px 0 4px;
  }
  .name-settings input{
    width:100%;
    font-family:inherit;
    font-size:20px; font-weight:700;
    padding:10px 12px;
    border:2px solid #C9BFA5; border-radius:10px;
    outline:none;
  }
  .name-settings input:focus{border-color:var(--navy);}
  .name-save{
    width:100%; margin-top:12px;
    background:var(--green); color:#fff;
    font-size:20px; font-weight:900;
    padding:14px 0; border-radius:12px;
    box-shadow:var(--shadow);
  }
  .stats{
    position:sticky; top:0; z-index:50;
    display:flex;
    background:var(--navy);
    color:#fff;
  }
  .stats .box{
    flex:1; text-align:center; padding:8px 4px 10px;
  }
  .stats .box + .box{border-left:2px solid rgba(255,255,255,.25);}
  .stats .label{font-size:15px; opacity:.9;}
  .stats .value{font-size:32px; font-weight:800; line-height:1.1;}
  .stats .unit{font-size:16px; font-weight:600;}

  /* ===== モードタブ ===== */
  .tabs{
    display:flex; gap:6px; padding:10px 8px 0;
  }
  .tab{
    flex:1;
    background:#E3DCCB;
    color:#5A5344;
    font-size:16px; font-weight:800;
    padding:14px 2px;
    border-radius:14px 14px 0 0;
    line-height:1.25;
  }
  .tab small{display:block; font-size:11px; font-weight:600;}
  .tab.active{background:var(--white); color:var(--red); box-shadow:0 -3px 0 var(--red) inset;}

  main{
    background:var(--white);
    margin:0 8px;
    border-radius:0 0 16px 16px;
    padding:14px 12px 18px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
  }
  .panel{display:none;}
  .panel.active{display:block;}
  .section-title{
    font-size:16px; font-weight:800; color:var(--navy);
    margin:14px 0 8px; display:flex; align-items:center; gap:6px;
  }

  /* ===== 定額ボタン ===== */
  .price-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .price-btn{
    background:var(--gold);
    color:#fff;
    font-size:34px; font-weight:900;
    padding:22px 4px;
    border-radius:16px;
    box-shadow:var(--shadow);
    text-shadow:0 1px 2px rgba(0,0,0,.2);
  }
  .price-btn:nth-child(even){background:#F08C2E;}

  .edit-prices-btn{
    display:block; margin:12px auto 0;
    background:#EDE7D6; color:#6B6250;
    font-size:15px; font-weight:700;
    padding:10px 18px; border-radius:999px;
  }

  /* ===== 金額設定パネル ===== */
  .settings{
    display:none;
    background:#F4F1E6;
    border:2px solid var(--navy);
    border-radius:14px;
    padding:12px;
    margin-top:12px;
  }
  .settings.open{display:block;}
  .settings p{margin:0 0 10px; font-size:15px; font-weight:700; color:var(--navy);}
  .settings-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .settings-grid label{
    display:flex; align-items:center; gap:4px;
    background:#fff; border:2px solid #C9BFA5;
    border-radius:10px; padding:6px 8px;
    font-size:14px; font-weight:700; color:#8A7E60;
  }
  .settings-grid input{
    width:100%; border:none; outline:none;
    font-family:inherit;
    font-size:24px; font-weight:800; color:var(--ink);
    text-align:right;
  }
  .settings-grid .yen-mark{font-size:16px; color:#8A7E60;}
  .settings-actions{
    display:flex; gap:8px; margin-top:10px;
  }
  .settings-save{
    flex:2;
    background:var(--green); color:#fff;
    font-size:20px; font-weight:900;
    padding:14px 0; border-radius:12px;
    box-shadow:var(--shadow);
  }
  .settings-default{
    flex:1;
    background:#8A93A3; color:#fff;
    font-size:15px; font-weight:700;
    padding:14px 4px; border-radius:12px;
    box-shadow:var(--shadow);
  }

  /* ===== テンキー ===== */
  .free-display{
    background:#F4F1E6;
    border:3px solid var(--navy);
    border-radius:14px;
    font-size:42px; font-weight:900;
    text-align:right;
    padding:10px 16px;
    margin-bottom:10px;
    min-height:70px;
  }
  .tenkey{
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  }
  .tenkey button{
    background:var(--navy); color:#fff;
    font-size:32px; font-weight:800;
    padding:18px 0; border-radius:14px;
    box-shadow:var(--shadow);
  }
  .tenkey .key-del{background:#8A6A4F; font-size:26px;}
  .add-free-btn{
    width:100%; margin-top:10px;
    background:var(--green); color:#fff;
    font-size:28px; font-weight:900;
    padding:18px 0; border-radius:16px;
    box-shadow:var(--shadow);
  }

  /* ===== 現在の会計 ===== */
  .cart{
    background:#FDF3DF;
    border:2px dashed var(--gold);
    border-radius:14px;
    padding:10px 12px;
    margin-top:14px;
  }
  .cart-items{
    display:flex; flex-wrap:wrap; gap:6px;
    min-height:34px;
  }
  .chip{
    background:var(--white);
    border:2px solid var(--gold);
    border-radius:999px;
    padding:5px 12px;
    font-size:18px; font-weight:800;
  }
  .cart-empty{color:#A08C64; font-size:16px; padding:4px 2px;}
  .cart-total{
    text-align:right;
    font-size:20px; font-weight:800;
    margin-top:8px; color:var(--navy);
  }
  .cart-total b{font-size:38px; color:var(--red);}

  /* ===== お支払い ===== */
  .pay-area{
    margin-top:14px;
    background:#EDF4FB;
    border:2px solid var(--navy);
    border-radius:14px;
    padding:12px;
  }
  .tender-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  }
  .tender-btn{
    background:var(--navy); color:#fff;
    font-size:22px; font-weight:800;
    padding:16px 0; border-radius:14px;
    box-shadow:var(--shadow);
  }
  .tender-btn.exact{background:var(--green);}
  .tender-btn.clear{background:#8A93A3;}
  .tender-now{
    text-align:center; font-size:19px; font-weight:700; margin:10px 0 2px;
  }
  .tender-now b{font-size:30px; color:var(--navy);}
  .change-display{
    text-align:center;
    border-radius:14px;
    padding:12px 6px;
    margin-top:8px;
    font-weight:900;
  }
  .change-display.ok{background:var(--green); color:#fff;}
  .change-display.short{background:var(--gold); color:#fff;}
  .change-display.idle{background:#D8DEE8; color:#5A6474;}
  .change-display .cd-label{font-size:22px;}
  .change-display .cd-value{font-size:64px; line-height:1.05;}
  .checkout-btn{
    width:100%; margin-top:12px;
    background:var(--red); color:#fff;
    font-size:28px; font-weight:900;
    padding:20px 0; border-radius:16px;
    box-shadow:var(--shadow);
  }
  .checkout-btn:disabled{background:#CBB9B4; box-shadow:none; transform:none;}

  /* ===== 無料カウンター ===== */
  .counter-count{
    text-align:center; margin:8px 0 14px;
  }
  .counter-count .num{font-size:88px; font-weight:900; color:var(--navy); line-height:1;}
  .counter-count .unit{font-size:26px; font-weight:800; color:var(--navy);}
  .count-btn{
    width:100%;
    background:var(--green); color:#fff;
    font-size:40px; font-weight:900;
    padding:52px 0;
    border-radius:24px;
    box-shadow:0 5px 0 rgba(0,0,0,.2);
  }

  /* ===== 下部固定バー ===== */
  .bottom-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:60;
    display:flex; gap:8px;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    background:rgba(255,248,236,.97);
    border-top:2px solid #E3DCCB;
  }
  .undo-btn{
    flex:1;
    background:var(--gold); color:#fff;
    font-size:15px; font-weight:900;
    padding:14px 2px; border-radius:14px;
    box-shadow:var(--shadow);
    line-height:1.25;
  }
  .copy-btn{
    flex:1;
    background:var(--navy); color:#fff;
    font-size:15px; font-weight:900;
    padding:14px 2px; border-radius:14px;
    box-shadow:var(--shadow);
    line-height:1.25;
  }
  .line-btn{
    flex:1;
    background:#06C755; color:#fff;   /* LINEブランドグリーン */
    font-size:15px; font-weight:900;
    padding:14px 2px; border-radius:14px;
    box-shadow:var(--shadow);
    line-height:1.25;
  }
  .reset-link{
    display:block; text-align:center;
    margin:22px auto 8px;
    background:none; color:#B0483A;
    font-size:14px; text-decoration:underline;
  }

  /* トースト */
  #toast{
    position:fixed; left:50%; bottom:110px; transform:translateX(-50%);
    background:var(--ink); color:#fff;
    font-size:18px; font-weight:700;
    padding:12px 22px; border-radius:999px;
    opacity:0; pointer-events:none;
    transition:opacity .25s;
    z-index:100; white-space:nowrap;
  }
  #toast.show{opacity:1;}

  @media (min-width:600px){
    body{max-width:560px; margin:0 auto;}
    .bottom-bar{max-width:560px; margin:0 auto;}
  }
</style>
</head>
<body>

<header>
  <h1>🏮 お祭りかんたんレジ</h1>
  <p class="booth-name" id="boothNameDisplay"></p>
</header>

<div class="stats">
  <div class="box">
    <div class="label">💰 本日の売上合計</div>
    <div class="value"><span id="statSales">0</span><span class="unit"> 円</span></div>
  </div>
  <div class="box">
    <div class="label">👥 総客数</div>
    <div class="value"><span id="statCount">0</span><span class="unit"> 人</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tabFixed" onclick="setMode('fixed')">🍧 定額商品<small>売店・ゲーム</small></button>
  <button class="tab" id="tabFree" onclick="setMode('free')">🔢 金額入力<small>バザー・募金</small></button>
  <button class="tab" id="tabCounter" onclick="setMode('counter')">🙋 無料体験<small>人数カウント</small></button>
</div>

<main>
  <!-- 定額モード -->
  <div class="panel active" id="panelFixed">
    <div class="section-title">🛒 商品のねだんを押してください</div>
    <div class="price-grid" id="priceGrid"></div>
    <button class="edit-prices-btn" onclick="toggleSettings()">⚙ 金額ボタンを変更する</button>
    <div class="settings" id="settingsPanel">
      <p>⚙ 8つのボタンの金額を入力して「保存」を押してください</p>
      <div class="settings-grid" id="settingsGrid"></div>
      <div class="settings-actions">
        <button class="settings-save" onclick="savePrices()">💾 保存する</button>
        <button class="settings-default" onclick="defaultPrices()">最初に戻す</button>
      </div>
    </div>
  </div>

  <!-- 自由金額モード -->
  <div class="panel" id="panelFree">
    <div class="section-title">🔢 金額を入力して「追加」を押してください</div>
    <div class="free-display" id="freeDisplay">0 円</div>
    <div class="tenkey">
      <button onclick="keyIn('1')">1</button><button onclick="keyIn('2')">2</button><button onclick="keyIn('3')">3</button>
      <button onclick="keyIn('4')">4</button><button onclick="keyIn('5')">5</button><button onclick="keyIn('6')">6</button>
      <button onclick="keyIn('7')">7</button><button onclick="keyIn('8')">8</button><button onclick="keyIn('9')">9</button>
      <button onclick="keyIn('00')">00</button><button onclick="keyIn('0')">0</button><button class="key-del" onclick="keyDel()">⌫ 消す</button>
    </div>
    <button class="add-free-btn" onclick="addFree()">➕ この金額を追加する</button>
  </div>

  <!-- 無料カウンターモード -->
  <div class="panel" id="panelCounter">
    <div class="section-title">🙋 お客さんが来たらボタンを押してください</div>
    <div class="counter-count"><span class="num" id="counterNum">0</span><span class="unit"> 人</span></div>
    <button class="count-btn" onclick="countOne()">＋1 人 きたよ！</button>
  </div>

  <!-- 現在の会計（お金モード共通） -->
  <div id="moneyArea">
    <div class="cart">
      <div class="section-title" style="margin-top:0;">🧾 いまの会計</div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-total">合計 <b id="cartTotal">0</b> 円</div>
    </div>

    <div class="pay-area">
      <div class="section-title" style="margin-top:0;">💴 お預かり金額を押してください</div>
      <div class="tender-grid">
        <button class="tender-btn" onclick="addTender(500)">500円</button>
        <button class="tender-btn" onclick="addTender(1000)">1000円</button>
        <button class="tender-btn" onclick="addTender(5000)">5000円</button>
        <button class="tender-btn" onclick="addTender(10000)">1万円</button>
        <button class="tender-btn exact" onclick="tenderExact()">ちょうど</button>
        <button class="tender-btn clear" onclick="clearTender()">やり直す</button>
      </div>
      <div class="tender-now">お預かり：<b id="tenderNow">0</b> 円</div>
      <div class="change-display idle" id="changeBox">
        <div class="cd-label" id="changeLabel">おつり</div>
        <div class="cd-value" id="changeValue">−</div>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>✅ 次の会計へ（会計完了）</button>
    </div>
  </div>
</main>

<button class="name-edit-btn" onclick="toggleNameSettings()">✏ イベント名・ブース名を設定する</button>
<div class="name-settings" id="nameSettings">
  <label for="eventNameInput">🎪 イベント名（例：○○小学校 秋祭り）</label>
  <input type="text" id="eventNameInput" maxlength="30" placeholder="イベント名を入力">
  <label for="boothNameInput">🏪 ブース名（例：わたがし屋さん）</label>
  <input type="text" id="boothNameInput" maxlength="30" placeholder="ブース名を入力">
  <button class="name-save" onclick="saveNames()">💾 保存する</button>
</div>

<button class="reset-link" onclick="resetAll()">⚠ 1日の記録をぜんぶ消す（次のお祭り用）</button>

<div class="bottom-bar">
  <button class="undo-btn" onclick="undo()">↩ 直前を<br>取り消す</button>
  <button class="copy-btn" onclick="copyReport()">📋 集計を<br>コピー</button>
  <button class="line-btn" onclick="shareReport()">📨 LINEで<br>送る</button>
</div>

<div id="toast"></div>

<script>
"use strict";

/* ========== 状態 ========== */
var state = {
  salesTotal: 0,        // 本日の売上合計
  customerCount: 0,     // 総客数
  checkoutCount: 0,     // 会計回数
  soldByPrice: {},      // 定額商品の内訳 {"100": 3, ...}
  freeTotal: 0,         // 自由金額の売上内訳
  cart: [],             // いまの会計 [{amount, mode}]
  tender: 0,            // お預かり金額
  undoStack: [],        // 操作履歴（取り消し用）
  prices: [50, 100, 150, 200, 250, 300, 400, 500],  // 定額ボタンの金額（変更可能）
  eventName: '',        // イベント名
  boothName: ''         // ブース名
};
var mode = 'fixed';
var freeInput = '';
var DEFAULT_PRICES = [50, 100, 150, 200, 250, 300, 400, 500];

/* ========== イベント名・ブース名 ========== */
function renderNames(){
  var parts = [];
  if(state.eventName) parts.push(state.eventName);
  if(state.boothName) parts.push(state.boothName);
  document.getElementById('boothNameDisplay').textContent = parts.join('　／　');
}
function toggleNameSettings(){
  var panel = document.getElementById('nameSettings');
  var opening = !panel.classList.contains('open');
  if(opening){
    document.getElementById('eventNameInput').value = state.eventName;
    document.getElementById('boothNameInput').value = state.boothName;
    panel.classList.add('open');
  }else{
    panel.classList.remove('open');
  }
}
function saveNames(){
  state.eventName = document.getElementById('eventNameInput').value.trim();
  state.boothName = document.getElementById('boothNameInput').value.trim();
  document.getElementById('nameSettings').classList.remove('open');
  renderNames();
  toast('💾 名前を保存しました');
  save();
}

/* ========== 保存・読み込み（オフラインでも記録が残る） ========== */
function save(){
  try{ localStorage.setItem('omatsuriRegi', JSON.stringify(state)); }catch(e){}
}
function load(){
  try{
    var s = localStorage.getItem('omatsuriRegi');
    if(s){ var d = JSON.parse(s); for(var k in state){ if(d[k] !== undefined) state[k] = d[k]; } }
  }catch(e){}
}

/* ========== 表示ユーティリティ ========== */
function yen(n){ return n.toLocaleString('ja-JP'); }
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, 1600);
}

/* ========== 画面更新 ========== */
function render(){
  document.getElementById('statSales').textContent = yen(state.salesTotal);
  document.getElementById('statCount').textContent = yen(state.customerCount);
  document.getElementById('counterNum').textContent = yen(state.customerCount);

  // いまの会計
  var itemsEl = document.getElementById('cartItems');
  if(state.cart.length === 0){
    itemsEl.innerHTML = '<div class="cart-empty">まだ何も入っていません</div>';
  }else{
    itemsEl.innerHTML = state.cart.map(function(it){
      return '<span class="chip">' + yen(it.amount) + '円</span>';
    }).join('');
  }
  var total = cartTotal();
  document.getElementById('cartTotal').textContent = yen(total);
  document.getElementById('tenderNow').textContent = yen(state.tender);

  // おつり表示
  var box = document.getElementById('changeBox');
  var label = document.getElementById('changeLabel');
  var val = document.getElementById('changeValue');
  var btn = document.getElementById('checkoutBtn');

  if(total === 0){
    box.className = 'change-display idle';
    label.textContent = 'おつり';
    val.textContent = '−';
    btn.disabled = true;
  }else if(state.tender === 0){
    box.className = 'change-display idle';
    label.textContent = 'お預かりを押してください';
    val.textContent = '−';
    btn.disabled = false; // ちょうど手渡し等、預かり未入力でも完了できる
  }else if(state.tender < total){
    box.className = 'change-display short';
    label.textContent = 'あと足りない金額';
    val.textContent = yen(total - state.tender) + ' 円';
    btn.disabled = true;
  }else{
    box.className = 'change-display ok';
    label.textContent = 'おつり';
    val.textContent = yen(state.tender - total) + ' 円';
    btn.disabled = false;
  }

  // 自由金額表示
  document.getElementById('freeDisplay').textContent = yen(freeInput === '' ? 0 : parseInt(freeInput, 10)) + ' 円';

  save();
}
function cartTotal(){
  var t = 0;
  for(var i = 0; i < state.cart.length; i++) t += state.cart[i].amount;
  return t;
}

/* ========== モード切り替え ========== */
function setMode(m){
  mode = m;
  document.getElementById('tabFixed').className   = 'tab' + (m === 'fixed'   ? ' active' : '');
  document.getElementById('tabFree').className    = 'tab' + (m === 'free'    ? ' active' : '');
  document.getElementById('tabCounter').className = 'tab' + (m === 'counter' ? ' active' : '');
  document.getElementById('panelFixed').className   = 'panel' + (m === 'fixed'   ? ' active' : '');
  document.getElementById('panelFree').className    = 'panel' + (m === 'free'    ? ' active' : '');
  document.getElementById('panelCounter').className = 'panel' + (m === 'counter' ? ' active' : '');
  document.getElementById('moneyArea').style.display = (m === 'counter') ? 'none' : 'block';
  render();
}

/* ========== 定額商品 ========== */
function addItem(amount){
  state.cart.push({amount: amount, mode: 'fixed'});
  state.customerCount++;
  state.undoStack.push({type: 'item'});
  toast(yen(amount) + '円 を追加しました');
  render();
}

/* ========== 自由金額（テンキー） ========== */
function keyIn(k){
  if(freeInput.length >= 6) return; // 最大999,999円
  if(freeInput === '' && (k === '0' || k === '00')) return;
  freeInput += k;
  render();
}
function keyDel(){
  freeInput = freeInput.slice(0, -1);
  render();
}
function addFree(){
  var n = parseInt(freeInput || '0', 10);
  if(n <= 0){ toast('金額を入力してください'); return; }
  state.cart.push({amount: n, mode: 'free'});
  state.customerCount++;
  state.undoStack.push({type: 'item'});
  freeInput = '';
  toast(yen(n) + '円 を追加しました');
  render();
}

/* ========== お預かり・おつり ========== */
function addTender(n){
  state.tender += n;
  render();
}
function tenderExact(){
  state.tender = cartTotal();
  render();
}
function clearTender(){
  state.tender = 0;
  render();
}

/* ========== 会計完了 ========== */
function checkout(){
  var total = cartTotal();
  if(total === 0) return;
  var items = state.cart.slice();
  state.salesTotal += total;
  state.checkoutCount++;
  for(var i = 0; i < items.length; i++){
    var it = items[i];
    if(it.mode === 'fixed'){
      state.soldByPrice[it.amount] = (state.soldByPrice[it.amount] || 0) + 1;
    }else{
      state.freeTotal += it.amount;
    }
  }
  state.undoStack.push({type: 'checkout', items: items, total: total});
  state.cart = [];
  state.tender = 0;
  toast('✅ 会計を完了しました！');
  render();
}

/* ========== 無料カウンター ========== */
function countOne(){
  state.customerCount++;
  state.undoStack.push({type: 'count'});
  toast('＋1人 カウントしました');
  render();
}

/* ========== 直前の操作を取り消す ========== */
function undo(){
  var op = state.undoStack.pop();
  if(!op){ toast('取り消す操作がありません'); return; }
  if(op.type === 'item'){
    state.cart.pop();
    state.customerCount = Math.max(0, state.customerCount - 1);
    toast('↩ 商品を1つ取り消しました');
  }else if(op.type === 'count'){
    state.customerCount = Math.max(0, state.customerCount - 1);
    toast('↩ 人数を1人戻しました');
  }else if(op.type === 'checkout'){
    state.salesTotal -= op.total;
    state.checkoutCount = Math.max(0, state.checkoutCount - 1);
    for(var i = 0; i < op.items.length; i++){
      var it = op.items[i];
      if(it.mode === 'fixed'){
        state.soldByPrice[it.amount] = Math.max(0, (state.soldByPrice[it.amount] || 0) - 1);
      }else{
        state.freeTotal -= it.amount;
      }
    }
    state.cart = op.items; // 会計前の状態に戻す
    toast('↩ 直前の会計を取り消しました');
  }
  render();
}

/* ========== 集計レポートのコピー ========== */
function buildReport(){
  var now = new Date();
  var lines = [];
  var title = '🏮 ';
  if(state.eventName) title += state.eventName + ' ';
  if(state.boothName) title += '「' + state.boothName + '」 ';
  lines.push(title + '集計レポート');
  lines.push('📅 ' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() +
             ' ' + now.getHours() + ':' + ('0' + now.getMinutes()).slice(-2) + ' 現在');
  lines.push('────────────');
  lines.push('💰 本日の売上合計：' + yen(state.salesTotal) + '円');
  lines.push('👥 総客数：' + yen(state.customerCount) + '人');
  lines.push('🧾 会計回数：' + yen(state.checkoutCount) + '回');
  var prices = Object.keys(state.soldByPrice).map(Number).sort(function(a,b){return a-b;});
  var hasFixed = prices.some(function(p){ return state.soldByPrice[p] > 0; });
  if(hasFixed){
    lines.push('────────────');
    lines.push('【定額商品の内訳】');
    prices.forEach(function(p){
      if(state.soldByPrice[p] > 0){
        lines.push('・' + yen(p) + '円 × ' + state.soldByPrice[p] + '個 ＝ ' + yen(p * state.soldByPrice[p]) + '円');
      }
    });
  }
  if(state.freeTotal > 0){
    lines.push('・自由金額の合計：' + yen(state.freeTotal) + '円');
  }
  return lines.join('\n');
}
/* ========== LINEで送る ========== */
function shareReport(){
  var text = buildReport();
  // スマホの共有メニュー（LINE・メール等が選べる）を優先
  if(navigator.share){
    navigator.share({ text: text }).catch(function(err){
      // ユーザーがキャンセルした場合は何もしない
      if(err && err.name === 'AbortError') return;
      openLineShare(text);
    });
  }else{
    openLineShare(text);
  }
}
function openLineShare(text){
  // LINE公式の共有URL（LINEアプリが開き、送り先を選ぶだけ）
  window.location.href = 'https://line.me/R/share?text=' + encodeURIComponent(text);
}

function copyReport(){
  var text = buildReport();
  var done = function(){ toast('📋 コピーしました！LINEに貼り付けてください'); };
  var fallback = function(){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{
      if(document.execCommand('copy')){ done(); }
      else{ prompt('この文をコピーしてください', text); }
    }catch(e){ prompt('この文をコピーしてください', text); }
    document.body.removeChild(ta);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, fallback);
  }else{
    fallback();
  }
}

/* ========== 全リセット ========== */
function resetAll(){
  if(!confirm('本日の売上・客数の記録をすべて消します。\nよろしいですか？')) return;
  if(!confirm('本当に消しますか？（元に戻せません）')) return;
  var keepPrices = state.prices.slice(); // 金額ボタンの設定は残す
  var keepEvent = state.eventName, keepBooth = state.boothName; // 名前も残す
  state = { salesTotal:0, customerCount:0, checkoutCount:0, soldByPrice:{}, freeTotal:0, cart:[], tender:0, undoStack:[], prices: keepPrices, eventName: keepEvent, boothName: keepBooth };
  freeInput = '';
  buildPriceGrid();
  toast('記録をリセットしました');
  render();
}

/* ========== 金額ボタンの設定 ========== */
function buildPriceGrid(){
  var grid = document.getElementById('priceGrid');
  grid.innerHTML = '';
  state.prices.forEach(function(p){
    var b = document.createElement('button');
    b.className = 'price-btn';
    b.textContent = yen(p) + '円';
    b.onclick = function(){ addItem(p); };
    grid.appendChild(b);
  });
}
function toggleSettings(){
  var panel = document.getElementById('settingsPanel');
  var opening = !panel.classList.contains('open');
  if(opening){
    var grid = document.getElementById('settingsGrid');
    grid.innerHTML = '';
    state.prices.forEach(function(p, i){
      var label = document.createElement('label');
      label.innerHTML = (i + 1) + '. <input type="number" inputmode="numeric" min="0" max="999999" id="priceInput' + i + '" value="' + p + '"><span class="yen-mark">円</span>';
      grid.appendChild(label);
    });
    panel.classList.add('open');
  }else{
    panel.classList.remove('open');
  }
}
function savePrices(){
  var newPrices = [];
  for(var i = 0; i < state.prices.length; i++){
    var v = parseInt(document.getElementById('priceInput' + i).value, 10);
    if(isNaN(v) || v <= 0){ toast('金額は1円以上で入力してください'); return; }
    newPrices.push(v);
  }
  state.prices = newPrices;
  document.getElementById('settingsPanel').classList.remove('open');
  buildPriceGrid();
  toast('💾 金額ボタンを保存しました');
  render();
}
function defaultPrices(){
  state.prices = DEFAULT_PRICES.slice();
  document.getElementById('settingsPanel').classList.remove('open');
  buildPriceGrid();
  toast('金額ボタンを最初の設定に戻しました');
  render();
}

/* ========== 初期化 ========== */
(function init(){
  load();
  buildPriceGrid();
  renderNames();
  render();
})();

/* ========== オフライン対応（Service Worker登録） ========== */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(function(e){
      // file:// で開いた場合などは登録できないが、アプリ自体は普通に動く
      console.log('ServiceWorker未登録:', e);
    });
  });
}
